<script>
// ── Debug Logging ──────────────────────────────────────────────
function dbg(msg, type='info') {
  const el = document.getElementById('debugLog');
  if (!el) { console.log(`[DBG][${type}] ${msg}`); return; }
  const colors = {info:'#94a3b8', ok:'#4ade80', err:'#f87171', warn:'#fbbf24'};
  const time = new Date().toLocaleTimeString('th-TH');
  el.innerHTML += `<div style="color:${colors[type]||colors.info};border-bottom:1px solid #1e293b;padding:2px 0"><span style="color:#475569">${time}</span> ${msg}</div>`;
  el.scrollTop = el.scrollHeight;
  console.log(`[DBG][${type}] ${msg}`);
}
document.addEventListener('keydown', e => {
  if (e.ctrlKey && e.shiftKey && e.key === 'D') {
    const p = document.getElementById('debugPanel');
    if(p) p.style.display = p.style.display === 'none' ? 'block' : 'none';
  }
});
</script>
